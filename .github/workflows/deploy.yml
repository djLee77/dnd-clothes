name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies & Setup (Front & Back)
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Prepare Artifacts for Deployment
        run: |
          tar -cvf deployment.tar dist/ package.json server/ 

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment
          path: deployment.tar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment

      - name: Deploy to Server via SSH
        uses: appleboy/scp-action@release
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deployment.tar"
          target: "/path/to/your/app"
          
      - name: Execute Server Restart Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /path/to/your/app
            tar -xvf deployment.tar
            npm run postinstall
            # Use PM2 to restart the server
            pm2 restart dnd-closet || pm2 start npm --name "dnd-closet" -- start
